<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Email Template</title>
  <!--[if mso]>
  <style type="text/css">
    table { border-collapse: collapse; }
    .fallback-font { font-family: Arial, sans-serif; }
  </style>
  <![endif]-->
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;">
  <!-- Wrapper table for background color -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
         style="background-color:#f4f4f4;">
    <tr>
      <td align="center" style="padding:20px 10px;">

        <!-- Content container - 600px max width -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0"
               style="background-color:#ffffff; max-width:600px; width:100%; border-radius:8px;">

          <!-- Body content -->
          <tr>
            <td style="padding:40px 30px 30px 30px; font-family:Arial, Helvetica, sans-serif; font-size:16px; line-height:1.6; color:#333333;">
              {{BODY_CONTENT}}
            </td>
          </tr>

          <!-- CTA SECTION START -->
          <tr>
            <td align="center" style="padding:0 30px 40px 30px;">
              <!--[if mso]>
              <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word"
                href="{{CTA_URL}}" style="height:50px;v-text-anchor:middle;width:200px;" arcsize="12%"
                strokecolor="#2563eb" fillcolor="#2563eb">
              <w:anchorlock/>
              <center style="color:#ffffff;font-family:Arial,sans-serif;font-size:16px;font-weight:bold;">
                {{CTA_TEXT}}
              </center>
              </v:roundrect>
              <![endif]-->
              <!--[if !mso]><!-->
              <a href="{{CTA_URL}}"
                 style="display:inline-block; padding:14px 30px; background-color:#2563eb; color:#ffffff;
                        text-decoration:none; border-radius:6px; font-family:Arial, Helvetica, sans-serif;
                        font-size:16px; font-weight:bold; text-align:center; mso-hide:all;">
                {{CTA_TEXT}}
              </a>
              <!--<![endif]-->
            </td>
          </tr>
          <!-- CTA SECTION END -->

        </table>
        <!-- End content container -->

      </td>
    </tr>
  </table>
  <!-- End wrapper -->
</body>
</html>
