<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Template Preview — {{SKILL_TITLE}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .header {
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 20px 40px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 {
      font-size: 22px;
      color: #e94560;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 14px;
      color: #a0a0b0;
    }
    .email-section {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .email-card {
      background: #16213e;
      border-radius: 12px;
      margin-bottom: 40px;
      overflow: hidden;
      border: 1px solid #0f3460;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .email-label {
      background: #0f3460;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .email-label h2 {
      font-size: 16px;
      color: #e94560;
      font-weight: 600;
    }
    .email-label .email-number {
      background: #e94560;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .email-meta {
      padding: 16px 24px;
      border-bottom: 1px solid #0f3460;
    }
    .email-meta .field {
      margin-bottom: 8px;
      font-size: 14px;
    }
    .email-meta .field-label {
      color: #a0a0b0;
      font-weight: 600;
      display: inline-block;
      width: 80px;
    }
    .email-meta .field-value {
      color: #e0e0e0;
    }
    .email-preview {
      background: #f4f4f4;
      padding: 0;
    }
    .email-preview iframe {
      width: 100%;
      border: none;
      min-height: 500px;
      display: block;
    }
    .footer {
      text-align: center;
      padding: 30px;
      color: #666;
      font-size: 13px;
    }
    .footer em {
      color: #e94560;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📧 Email Template Preview</h1>
    <p>Review how your emails will look before pushing to GoHighLevel. Scroll down to see all templates.</p>
  </div>

  <div class="email-section">
    {{EMAIL_CARDS}}
  </div>

  <div class="footer">
    <p>Preview generated by <em>ghl-email-templates</em> skill. Return to Claude to confirm or edit.</p>
  </div>

  <script>
    // Auto-resize iframes to fit content
    document.querySelectorAll('.email-preview iframe').forEach(iframe => {
      iframe.addEventListener('load', function() {
        try {
          const height = iframe.contentDocument.documentElement.scrollHeight;
          iframe.style.height = (height + 20) + 'px';
        } catch(e) {
          // Cross-origin fallback
          iframe.style.height = '600px';
        }
      });
    });
  </script>
</body>
</html>
